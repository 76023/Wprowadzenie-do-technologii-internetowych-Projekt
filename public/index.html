<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ISACzytac - Strona główna</title>
    <link rel="stylesheet" href="/css/style.css">
  </head>
  <body>
    <div class="uklad">
      <aside class="panel-nawigacji">
        <a class="logo" href="/">ISACzytac</a>
        <nav class="nawigacja-glowna">
          <a href="/" data-sciezka="/">Główna</a>
          <a href="/ksiazki" data-sciezka="/ksiazki">Książki</a>
          <a href="/o-projekcie" data-sciezka="/o-projekcie">O projekcie</a>
        </nav>

      <main class="kolumna-glowna">
        <header class="naglowek-strony">

        <section class="karta">

            <p class="tekst-pomocniczy">Ładowanie książek...</p>

          <a class="przycisk" href="/ksiazki">Przejdź do książek</a>
        </section>
      </main>
    </div>

    <nav class="nawigacja-dolna">
      <a href="/">Główna</a>
      <a href="/ksiazki">Książki</a>
      <a href="/o-projekcie">Projekt</a>

    <script src="/js/wspolne.js"></script>
    <script src="/js/start.js"></script>
