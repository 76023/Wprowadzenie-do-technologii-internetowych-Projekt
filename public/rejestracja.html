<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ISACzytac - Rejestracja</title>
    <link rel="stylesheet" href="/css/style.css">
  </head>
  <body>
    <div class="uklad">
      <aside class="panel-nawigacji">
        <a class="logo" href="/">ISACzytac</a>
        <nav class="nawigacja-glowna">
          <a href="/" data-sciezka="/">Główna</a>
          <a href="/ksiazki" data-sciezka="/ksiazki">Książki</a>
          <a href="/dodaj-ksiazke" data-sciezka="/dodaj-ksiazke">Dodaj książkę</a>
          <a href="/moje-ksiazki" data-sciezka="/moje-ksiazki">Moje książki</a>
          <a href="/logowanie" data-sciezka="/logowanie" data-tylko-gosc>Logowanie</a>
          <a href="/rejestracja" data-sciezka="/rejestracja" data-tylko-gosc>Rejestracja</a>
          <a href="/o-projekcie" data-sciezka="/o-projekcie">O projekcie</a>
        </nav>
        <div class="panel-uzytkownika" data-panel-uzytkownika></div>
      </aside>

      <main class="kolumna-glowna">
        <header class="naglowek-strony">
          <h1>Rejestracja</h1>
          <p>Utwórz konto, aby dodawać książki i komentarze.</p>
        </header>

        <section class="karta">
          <form class="formularz" id="formularz-rejestracji">
            <div class="pole-formularza">
              <label for="pole-nazwy">Nazwa użytkownika</label>
              <input type="text" name="nazwa" id="pole-nazwy" minlength="3" maxlength="30" required>
            </div>

            <div class="pole-formularza">
              <label for="pole-email">Email</label>
              <input type="email" name="email" id="pole-email" required>
            </div>

            <div class="pole-formularza">
              <label for="pole-hasla">Hasło</label>
              <input type="password" name="haslo" id="pole-hasla" minlength="6" required>
            </div>

            <button class="przycisk" type="submit">Utwórz konto</button>
          </form>

          <p class="tekst-pomocniczy odstep-gorny">
            Masz już konto? <a class="link-akcent" href="/logowanie">Przejdź do logowania</a>.
          </p>

          <div class="komunikat" id="komunikat-rejestracji" aria-live="polite"></div>
        </section>
      </main>
    </div>

    <nav class="nawigacja-dolna">
      <a href="/">Główna</a>
      <a href="/ksiazki">Książki</a>
      <a href="/dodaj-ksiazke">Dodaj</a>
      <a href="/logowanie" data-konto-mobilne>Konto</a>
    </nav>

    <script src="/js/wspolne.js"></script>
    <script src="/js/rejestracja.js"></script>
  </body>
</html>
