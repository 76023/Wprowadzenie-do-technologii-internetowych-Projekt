<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ISACzytac - Edytuj książkę</title>
    <link rel="stylesheet" href="/css/style.css">
  </head>
  <body>
    <div class="uklad">
      <aside class="panel-nawigacji">
        <a class="logo" href="/">ISACzytac</a>
        <nav class="nawigacja-glowna">
          <a href="/" data-sciezka="/">Główna</a>
          <a href="/ksiazki" data-sciezka="/ksiazki">Książki</a>
          <a href="/dodaj-ksiazke" data-sciezka="/dodaj-ksiazke">Dodaj książkę</a>
          <a href="/moje-ksiazki" data-sciezka="/moje-ksiazki">Moje książki</a>
          <a href="/logowanie" data-sciezka="/logowanie" data-tylko-gosc>Logowanie</a>
          <a href="/rejestracja" data-sciezka="/rejestracja" data-tylko-gosc>Rejestracja</a>
          <a href="/o-projekcie" data-sciezka="/o-projekcie">O projekcie</a>
        </nav>
        <div class="panel-uzytkownika" data-panel-uzytkownika></div>
      </aside>

      <main class="kolumna-glowna">
        <header class="naglowek-strony">
          <h1>Edytuj książkę</h1>
          <p>Zmiany może zapisać tylko użytkownik, który dodał książkę.</p>
        </header>

        <section class="karta">
          <form class="formularz" id="formularz-edycji">
            <div class="pole-formularza">
              <label for="pole-tytulu">Tytuł</label>
              <input type="text" name="tytul" id="pole-tytulu" minlength="2" maxlength="120" required>
            </div>

            <div class="pole-formularza">
              <label for="pole-autora">Autor</label>
              <input type="text" name="autor" id="pole-autora" minlength="2" maxlength="120" required>
            </div>

            <div class="pole-formularza">
              <label for="pole-kategorii">Kategoria</label>
              <select name="id_kategorii" id="pole-kategorii" required>
                <option value="">Ładowanie kategorii...</option>
              </select>
            </div>

            <div class="pole-formularza">
              <label for="pole-oceny">Ocena książki</label>
              <input type="number" name="ocena" id="pole-oceny" min="1" max="5" step="0.5" required>
            </div>

            <div class="pole-formularza">
              <label for="pole-okladki">Adres okładki (opcjonalnie)</label>
              <input type="url" name="okladka_url" id="pole-okladki" maxlength="500" placeholder="https://...">
              <small class="podpowiedz-pola">Link http lub https do obrazka okładki. Możesz pominąć - wtedy pokaże się zastępczy obrazek.</small>
            </div>

            <div class="pole-formularza">
              <label for="pole-opisu">Opis</label>
              <textarea name="opis" id="pole-opisu" minlength="20" maxlength="2000" required></textarea>
            </div>

            <button class="przycisk" type="submit">Zapisz zmiany</button>
          </form>

          <div class="komunikat" id="komunikat-edycji" aria-live="polite"></div>
        </section>
      </main>
    </div>

    <nav class="nawigacja-dolna">
      <a href="/">Główna</a>
      <a href="/ksiazki">Książki</a>
      <a href="/dodaj-ksiazke">Dodaj</a>
      <a href="/logowanie" data-konto-mobilne>Konto</a>
    </nav>

    <script src="/js/wspolne.js"></script>
    <script src="/js/edytuj-ksiazke.js"></script>
  </body>
</html>
