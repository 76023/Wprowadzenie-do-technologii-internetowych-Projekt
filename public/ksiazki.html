<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ISACzytac - Książki</title>
    <link rel="stylesheet" href="/css/style.css">
  </head>
  <body>
    <div class="uklad">
      <aside class="panel-nawigacji">
        <a class="logo" href="/">ISACzytac</a>
        <nav class="nawigacja-glowna">
          <a href="/" data-sciezka="/">Główna</a>
          <a href="/ksiazki" data-sciezka="/ksiazki">Książki</a>
          <a href="/dodaj-ksiazke" data-sciezka="/dodaj-ksiazke">Dodaj książkę</a>
          <a href="/moje-ksiazki" data-sciezka="/moje-ksiazki">Moje książki</a>
          <a href="/logowanie" data-sciezka="/logowanie">Logowanie</a>
          <a href="/rejestracja" data-sciezka="/rejestracja">Rejestracja</a>
          <a href="/o-projekcie" data-sciezka="/o-projekcie">O projekcie</a>
        </nav>
        <div class="panel-uzytkownika" data-panel-uzytkownika></div>
      </aside>

      <main class="kolumna-glowna">
        <header class="naglowek-strony">
          <h1>Lista książek</h1>
          <p>Książki dodane przez użytkowników aplikacji.</p>
        </header>

        <section class="karta">
          <form class="formularz-filtry" id="formularz-filtrow">
            <label class="pole-formularza">
              <span>Szukaj po tytule lub autorze</span>
              <input type="search" name="szukaj" id="pole-szukaj" placeholder="np. Lem albo Lalka">
            </label>

            <label class="pole-formularza">
              <span>Kategoria</span>
              <select name="kategoria" id="filtr-kategorii">
                <option value="">Wszystkie kategorie</option>
              </select>
            </label>

            <div class="akcje-karty">
              <button class="przycisk" type="submit">Szukaj</button>
              <a class="przycisk-drugorzedny" href="/ksiazki">Wyczyść</a>
            </div>
          </form>
        </section>

        <div id="lista-ksiazek">
          <section class="karta">
            <p class="tekst-pomocniczy">Ładowanie książek...</p>
          </section>
        </div>
      </main>
    </div>

    <nav class="nawigacja-dolna">
      <a href="/">Główna</a>
      <a href="/ksiazki">Książki</a>
      <a href="/dodaj-ksiazke">Dodaj</a>
      <a href="/logowanie">Konto</a>
    </nav>

    <script src="/js/wspolne.js"></script>
    <script src="/js/ksiazki.js"></script>
  </body>
</html>
