<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ISACzytac - Logowanie</title>
    <link rel="stylesheet" href="/css/style.css">
  </head>
  <body>
    <div class="uklad">
      <aside class="panel-nawigacji">
        <a class="logo" href="/">ISACzytac</a>
        <nav class="nawigacja-glowna">
          <a href="/" data-sciezka="/">Główna</a>
          <a href="/ksiazki" data-sciezka="/ksiazki">Książki</a>
          <a href="/logowanie" data-sciezka="/logowanie">Logowanie</a>
          <a href="/rejestracja" data-sciezka="/rejestracja">Rejestracja</a>
          <a href="/o-projekcie" data-sciezka="/o-projekcie">O projekcie</a>
        </nav>
        <div class="panel-uzytkownika" data-panel-uzytkownika></div>
      </aside>

      <main class="kolumna-glowna">
        <header class="naglowek-strony">
          <h1>Logowanie</h1>
          <p>Zaloguj się, aby dodawać książki i komentować.</p>
        </header>

        <section class="karta">
          <form class="formularz" id="formularz-logowania">
            <label class="pole-formularza">
              <span>Email</span>
              <input type="email" name="email" autocomplete="email" required>
            </label>

            <label class="pole-formularza">
              <span>Hasło</span>
              <input type="password" name="haslo" autocomplete="current-password" required>
            </label>

            <button class="przycisk" type="submit">Zaloguj</button>
          </form>

          <p class="tekst-pomocniczy odstep-gorny">
            Nie masz konta? <a class="link-akcent" href="/rejestracja">Przejdź do rejestracji</a>.
          </p>

          <div class="komunikat" id="komunikat-logowania" aria-live="polite"></div>
        </section>
      </main>
    </div>

    <nav class="nawigacja-dolna">
      <a href="/">Główna</a>
      <a href="/ksiazki">Książki</a>
      <a href="/logowanie">Konto</a>
    </nav>

    <script src="/js/wspolne.js"></script>
    <script src="/js/logowanie.js"></script>
  </body>
</html>
