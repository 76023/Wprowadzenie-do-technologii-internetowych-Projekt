<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ISACzytac - Logowanie</title>
    <link rel="stylesheet" href="/css/style.css">
  </head>
  <body>
    <div class="uklad">
      <header class="pasek-gorny">
        <div class="pasek-gorny-srodek">
          <a class="logo" href="/">ISACzytac</a>
          <nav class="nawigacja-glowna">
            <a href="/" data-sciezka="/">Strona główna</a>
            <a href="/ksiazki" data-sciezka="/ksiazki">Katalog</a>
            <a href="/dodaj-ksiazke" data-sciezka="/dodaj-ksiazke">Dodaj książkę</a>
            <a href="/moje-ksiazki" data-sciezka="/moje-ksiazki">Moje książki</a>
            <a href="/o-projekcie" data-sciezka="/o-projekcie">O projekcie</a>
            <a href="/logowanie" data-sciezka="/logowanie" data-tylko-gosc>Logowanie</a>
            <a href="/rejestracja" data-sciezka="/rejestracja" data-tylko-gosc>Rejestracja</a>
          </nav>
          <div class="panel-uzytkownika" data-panel-uzytkownika></div>
        </div>
      </header>

      <main class="kolumna-glowna">
        <header class="naglowek-strony">
          <h1>Logowanie</h1>
          <p>Zaloguj się, aby dodawać książki i opinie czytelników.</p>
        </header>

        <section class="karta karta-formularza">
          <form class="formularz" id="formularz-logowania">
            <div class="pole-formularza">
              <label for="pole-email">Email</label>
              <input type="email" name="email" id="pole-email" autocomplete="email" required>
            </div>

            <div class="pole-formularza">
              <label for="pole-hasla">Hasło</label>
              <input type="password" name="haslo" id="pole-hasla" autocomplete="current-password" required>
            </div>

            <button class="przycisk" type="submit">Zaloguj</button>
          </form>

          <p class="tekst-pomocniczy odstep-gorny">
            Nie masz konta? <a class="link-akcent" href="/rejestracja">Przejdź do rejestracji</a>.
          </p>

          <div class="komunikat" id="komunikat-logowania" aria-live="polite"></div>
        </section>
      </main>

      <footer class="stopka-strony">
        ISACzytac &copy; projekt semestralny. <a href="/o-projekcie">O projekcie</a>.
      </footer>
    </div>

    <nav class="nawigacja-dolna">
      <a href="/" data-sciezka="/">Główna</a>
      <a href="/ksiazki" data-sciezka="/ksiazki">Katalog</a>
      <a href="/dodaj-ksiazke" data-sciezka="/dodaj-ksiazke">Dodaj</a>
      <a href="/logowanie" data-konto-mobilne data-sciezka="/logowanie">Konto</a>
    </nav>

    <script src="/js/wspolne.js"></script>
    <script src="/js/logowanie.js"></script>
  </body>
</html>
